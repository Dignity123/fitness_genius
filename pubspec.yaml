# Fitness Genius - AI-Powered Fitness Application
# A complete Flutter/Dart fitness app with personalized workouts, exercise library,
# progress tracking, and AI-powered recommendations.

name: fitness_genius

description: |
  AI-powered fitness application featuring:
  - Personalized workout quests with rewards
  - Comprehensive exercise library (100+ exercises)
  - Live workout tracking with timer
  - Visual progress tracking with photos
  - Performance analytics and insights
  - AI trainer with recovery assessment
  - Local SQLite database (offline-first)
  - Dark tactical theme with acid green accents

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

 
  # STATE MANAGEMENT & ARCHITECTURE
  
  provider: ^6.0.0

 
  # LOCAL DATABASE & STORAGE
  
  # SQLite - Local relational database
  # 9 tables: quests, milestones, exercises, workouts, logs, sets, progress, metrics
  sqflite: ^2.3.0
  
  # SharedPreferences - Simple key-value storage
  # Used for: User settings, preferences, quick access values
  shared_preferences: ^2.2.0
  
  # Path utilities - Helper functions for file paths
  path: ^1.8.0
  
  path_provider: ^2.1.0


  # MEDIA & CAMERA

  image_picker: ^1.0.0


  # ANIMATIONS
  # Lottie - JSON-based animations

  lottie: ^2.4.0


  
  # Intl - Internationalization & localization
  # Used for: Date formatting, localized strings
  intl: ^0.19.0

   
  # UUID - Unique identifier generation
  # Used for: Quest IDs, Exercise IDs, Session IDs, etc.
  uuid: ^4.0.0



dev_dependencies:
  flutter_test:
    sdk: flutter

  
  flutter_lints: ^3.0.0
  
 

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/icons/
    - assets/images/
    - assets/backgrounds/
    - assets/screenshots/
